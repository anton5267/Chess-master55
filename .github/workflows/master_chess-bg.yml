name: chess-ci-cd

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_VERSION: 8.0.x
  NODE_VERSION: 20
  SOLUTION_PATH: src/Chess.sln
  WEB_PROJECT_PATH: src/Web/Chess.Web/Chess.Web.csproj
  WEB_WORKDIR: src/Web/Chess.Web
  AZURE_WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME }}
  AZURE_WEBAPP_SLOT: Production
  AZURE_HEALTHCHECK_PATH: /healthz

jobs:
  terraform_validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init (No Backend)
        run: terraform -chdir=terraform_azure init -backend=false

      - name: Terraform Validate
        run: terraform -chdir=terraform_azure validate

  build_test_publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.WEB_WORKDIR }}/package-lock.json

      - name: Install Frontend Dependencies
        run: npm ci
        working-directory: ${{ env.WEB_WORKDIR }}

      - name: Build Frontend Assets
        run: npm run build:assets
        working-directory: ${{ env.WEB_WORKDIR }}

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION_PATH }} --configuration Release --no-restore

      - name: Test
        run: dotnet test ${{ env.SOLUTION_PATH }} --configuration Release --no-build --verbosity normal

      - name: Publish
        run: dotnet publish ${{ env.WEB_PROJECT_PATH }} --configuration Release --no-build --output ${{ github.workspace }}/publish

      - name: Upload Publish Artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp-publish
          path: ${{ github.workspace }}/publish

  deploy_precheck:
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs:
      - terraform_validate
      - build_test_publish
    outputs:
      configured: ${{ steps.detect_oidc.outputs.configured }}
      deploy_mode: ${{ steps.detect_oidc.outputs.deploy_mode }}
      missing: ${{ steps.detect_oidc.outputs.missing }}
      resolved_url: ${{ steps.detect_oidc.outputs.resolved_url }}

    steps:
      - name: Detect OIDC Secrets
        id: detect_oidc
        shell: bash
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          AZURE_WEBAPP_NAME: ${{ env.AZURE_WEBAPP_NAME }}
          AZURE_WEBAPP_URL: ${{ secrets.AZURE_WEBAPP_URL }}
        run: |
          oidc_missing=()
          [ -z "${AZURE_CLIENT_ID}" ] && oidc_missing+=("AZURE_CLIENT_ID (secret)")
          [ -z "${AZURE_TENANT_ID}" ] && oidc_missing+=("AZURE_TENANT_ID (secret)")
          [ -z "${AZURE_SUBSCRIPTION_ID}" ] && oidc_missing+=("AZURE_SUBSCRIPTION_ID (secret)")

          shared_missing=()
          [ -z "${AZURE_WEBAPP_NAME}" ] && shared_missing+=("AZURE_WEBAPP_NAME (repository variable)")

          if [ -n "${AZURE_WEBAPP_URL}" ]; then
            resolved_url="${AZURE_WEBAPP_URL}"
          elif [ -n "${AZURE_WEBAPP_NAME}" ]; then
            resolved_url="https://${AZURE_WEBAPP_NAME}.azurewebsites.net"
          else
            resolved_url="(not configured)"
          fi

          if [ "${#shared_missing[@]}" -gt 0 ]; then
            echo "configured=false" >> "${GITHUB_OUTPUT}"
            echo "deploy_mode=none" >> "${GITHUB_OUTPUT}"
            printf 'missing=%s\n' "$(IFS='; '; echo "${shared_missing[*]}")" >> "${GITHUB_OUTPUT}"
            printf 'resolved_url=%s\n' "${resolved_url}" >> "${GITHUB_OUTPUT}"
            echo "::warning::Azure deployment config is incomplete. Missing shared settings."
            printf '::warning::Missing: %s\n' "$(IFS=', '; echo "${shared_missing[*]}")"
          elif [ "${#oidc_missing[@]}" -eq 0 ]; then
            echo "configured=true" >> "${GITHUB_OUTPUT}"
            echo "deploy_mode=oidc" >> "${GITHUB_OUTPUT}"
            echo "missing=none" >> "${GITHUB_OUTPUT}"
            printf 'resolved_url=%s\n' "${resolved_url}" >> "${GITHUB_OUTPUT}"
          elif [ -n "${AZURE_WEBAPP_PUBLISH_PROFILE}" ]; then
            echo "configured=true" >> "${GITHUB_OUTPUT}"
            echo "deploy_mode=publish_profile" >> "${GITHUB_OUTPUT}"
            printf 'missing=%s\n' "$(IFS='; '; echo "${oidc_missing[*]}")" >> "${GITHUB_OUTPUT}"
            printf 'resolved_url=%s\n' "${resolved_url}" >> "${GITHUB_OUTPUT}"
            echo "::notice::OIDC secrets missing. Falling back to publish profile deployment."
          else
            echo "configured=false" >> "${GITHUB_OUTPUT}"
            echo "deploy_mode=none" >> "${GITHUB_OUTPUT}"
            printf 'missing=%s\n' "$(IFS='; '; echo "${oidc_missing[*]}")" >> "${GITHUB_OUTPUT}"
            printf 'resolved_url=%s\n' "${resolved_url}" >> "${GITHUB_OUTPUT}"
            echo "::warning::Neither OIDC nor publish profile configuration is complete."
          fi

  deploy:
    if: needs.deploy_precheck.outputs.configured == 'true'
    runs-on: ubuntu-latest
    needs:
      - terraform_validate
      - build_test_publish
      - deploy_precheck
    environment:
      name: Production
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download Publish Artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp-publish
          path: ./publish

      - name: Azure Login (OIDC)
        if: needs.deploy_precheck.outputs.deploy_mode == 'oidc'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App (OIDC)
        if: needs.deploy_precheck.outputs.deploy_mode == 'oidc'
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: ${{ env.AZURE_WEBAPP_SLOT }}
          package: ./publish

      - name: Deploy to Azure Web App (Publish Profile)
        if: needs.deploy_precheck.outputs.deploy_mode == 'publish_profile'
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish

      - name: Post-Deploy Health Check
        shell: bash
        env:
          AZURE_WEBAPP_URL: ${{ secrets.AZURE_WEBAPP_URL }}
        run: |
          set -euo pipefail

          base_url="${AZURE_WEBAPP_URL:-https://${AZURE_WEBAPP_NAME}.azurewebsites.net}"
          base_url="${base_url%/}"
          health_path="${AZURE_HEALTHCHECK_PATH:-/healthz}"
          if [[ "${health_path}" != /* ]]; then
            health_path="/${health_path}"
          fi

          health_url="${base_url}${health_path}"
          echo "Health check URL: ${health_url}"

          success="false"
          for attempt in 1 2 3 4 5; do
            status_code="$(curl --silent --show-error --location --max-time 20 --connect-timeout 8 --output /tmp/healthcheck_body.txt --write-out '%{http_code}' "${health_url}" || true)"
            if [ "${status_code}" = "200" ]; then
              success="true"
              break
            fi

            echo "Attempt ${attempt}: health check returned HTTP ${status_code:-N/A}"
            sleep 6
          done

          if [ "${success}" != "true" ]; then
            echo "::error::Post-deploy health check failed for ${health_url}"
            cat /tmp/healthcheck_body.txt || true
            exit 1
          fi

      - name: Deployment Summary
        if: always()
        shell: bash
        env:
          AZURE_WEBAPP_URL: ${{ secrets.AZURE_WEBAPP_URL }}
        run: |
          if [ -n "${AZURE_WEBAPP_URL}" ]; then
            resolved_url="${AZURE_WEBAPP_URL}"
          elif [ -n "${AZURE_WEBAPP_NAME}" ]; then
            resolved_url="https://${AZURE_WEBAPP_NAME}.azurewebsites.net"
          else
            resolved_url="(not configured)"
          fi
          {
            echo "## Deployment Summary"
            echo ""
            echo "- Mode: \`${{ needs.deploy_precheck.outputs.deploy_mode }}\`"
            echo "- Status: \`deploy_executed\`"
            echo "- App Service: \`${AZURE_WEBAPP_NAME}\`"
            echo "- Slot: \`${AZURE_WEBAPP_SLOT}\`"
            echo "- Base URL: \`${resolved_url}\`"
            echo "- Health Path: \`${AZURE_HEALTHCHECK_PATH}\`"
            echo "- Missing OIDC Config: \`${{ needs.deploy_precheck.outputs.missing }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

  deploy_skipped:
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && needs.deploy_precheck.outputs.configured != 'true'
    runs-on: ubuntu-latest
    needs:
      - terraform_validate
      - build_test_publish
      - deploy_precheck

    steps:
      - name: Deployment Summary (Skipped)
        shell: bash
        run: |
          {
            echo "## Deployment Summary"
            echo ""
            echo "- Mode: \`${{ needs.deploy_precheck.outputs.deploy_mode }}\`"
            echo "- Status: \`deploy_skipped_missing_secrets\`"
            echo "- App Service: \`${AZURE_WEBAPP_NAME}\`"
            echo "- Slot: \`${AZURE_WEBAPP_SLOT}\`"
            echo "- Base URL: \`${{ needs.deploy_precheck.outputs.resolved_url }}\`"
            echo "- Health Path: \`${AZURE_HEALTHCHECK_PATH}\`"
            echo "- Missing OIDC Config: \`${{ needs.deploy_precheck.outputs.missing }}\`"
            echo ""
            echo "Configure missing values and rerun the workflow."
          } >> "${GITHUB_STEP_SUMMARY}"
