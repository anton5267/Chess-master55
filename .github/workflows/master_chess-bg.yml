name: chess-ci-cd

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_VERSION: 8.0.x
  NODE_VERSION: 20
  SOLUTION_PATH: src/Chess.sln
  WEB_PROJECT_PATH: src/Web/Chess.Web/Chess.Web.csproj
  WEB_WORKDIR: src/Web/Chess.Web
  AZURE_WEBAPP_NAME: chess-bg
  AZURE_WEBAPP_SLOT: Production
  AZURE_HEALTHCHECK_PATH: /healthz

jobs:
  terraform_validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init (No Backend)
        run: terraform -chdir=terraform_azure init -backend=false

      - name: Terraform Validate
        run: terraform -chdir=terraform_azure validate

  build_test_publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.WEB_WORKDIR }}/package-lock.json

      - name: Install Frontend Dependencies
        run: npm ci
        working-directory: ${{ env.WEB_WORKDIR }}

      - name: Build Frontend Assets
        run: npm run build:assets
        working-directory: ${{ env.WEB_WORKDIR }}

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION_PATH }} --configuration Release --no-restore

      - name: Test
        run: dotnet test ${{ env.SOLUTION_PATH }} --configuration Release --no-build --verbosity normal

      - name: Publish
        run: dotnet publish ${{ env.WEB_PROJECT_PATH }} --configuration Release --no-build --output ${{ github.workspace }}/publish

      - name: Upload Publish Artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp-publish
          path: ${{ github.workspace }}/publish

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs:
      - terraform_validate
      - build_test_publish
    environment:
      name: Production
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download Publish Artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp-publish
          path: ./publish

      - name: Validate OIDC Secrets
        shell: bash
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          if [ -z "${AZURE_CLIENT_ID}" ] || [ -z "${AZURE_TENANT_ID}" ] || [ -z "${AZURE_SUBSCRIPTION_ID}" ]; then
            echo "::error::Missing OIDC secrets. Configure AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID."
            exit 1
          fi

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: ${{ env.AZURE_WEBAPP_SLOT }}
          package: ./publish

      - name: Post-Deploy Health Check
        shell: bash
        env:
          AZURE_WEBAPP_URL: ${{ secrets.AZURE_WEBAPP_URL }}
        run: |
          set -euo pipefail

          base_url="${AZURE_WEBAPP_URL:-https://${AZURE_WEBAPP_NAME}.azurewebsites.net}"
          base_url="${base_url%/}"
          health_path="${AZURE_HEALTHCHECK_PATH:-/healthz}"
          if [[ "${health_path}" != /* ]]; then
            health_path="/${health_path}"
          fi

          health_url="${base_url}${health_path}"
          echo "Health check URL: ${health_url}"

          success="false"
          for attempt in 1 2 3 4 5; do
            status_code="$(curl --silent --show-error --location --max-time 20 --connect-timeout 8 --output /tmp/healthcheck_body.txt --write-out '%{http_code}' "${health_url}" || true)"
            if [ "${status_code}" = "200" ]; then
              success="true"
              break
            fi

            echo "Attempt ${attempt}: health check returned HTTP ${status_code:-N/A}"
            sleep 6
          done

          if [ "${success}" != "true" ]; then
            echo "::error::Post-deploy health check failed for ${health_url}"
            cat /tmp/healthcheck_body.txt || true
            exit 1
          fi

      - name: Deployment Summary
        if: always()
        shell: bash
        env:
          AZURE_WEBAPP_URL: ${{ secrets.AZURE_WEBAPP_URL }}
        run: |
          resolved_url="${AZURE_WEBAPP_URL:-https://${AZURE_WEBAPP_NAME}.azurewebsites.net}"
          {
            echo "## Deployment Summary"
            echo ""
            echo "- Mode: \`OIDC\`"
            echo "- App Service: \`${AZURE_WEBAPP_NAME}\`"
            echo "- Slot: \`${AZURE_WEBAPP_SLOT}\`"
            echo "- Base URL: \`${resolved_url}\`"
            echo "- Health Path: \`${AZURE_HEALTHCHECK_PATH}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
