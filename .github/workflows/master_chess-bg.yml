name: chess-ci-cd

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  DOTNET_VERSION: 8.0.x
  NODE_VERSION: 20
  SOLUTION_PATH: src/Chess.sln
  WEB_PROJECT_PATH: src/Web/Chess.Web/Chess.Web.csproj
  WEB_WORKDIR: src/Web/Chess.Web
  AZURE_WEBAPP_NAME: chess-bg
  AZURE_WEBAPP_SLOT: Production

jobs:
  terraform_validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init (No Backend)
        run: terraform -chdir=terraform_azure init -backend=false

      - name: Terraform Validate
        run: terraform -chdir=terraform_azure validate

  build_test_publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.WEB_WORKDIR }}/package-lock.json

      - name: Install Frontend Dependencies
        run: npm ci
        working-directory: ${{ env.WEB_WORKDIR }}

      - name: Build Frontend Assets
        run: npm run build:assets
        working-directory: ${{ env.WEB_WORKDIR }}

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION_PATH }} --configuration Release --no-restore

      - name: Test
        run: dotnet test ${{ env.SOLUTION_PATH }} --configuration Release --no-build --verbosity normal

      - name: Publish
        run: dotnet publish ${{ env.WEB_PROJECT_PATH }} --configuration Release --no-build --output ${{ github.workspace }}/publish

      - name: Upload Publish Artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp-publish
          path: ${{ github.workspace }}/publish

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs:
      - terraform_validate
      - build_test_publish
    environment:
      name: Production

    steps:
      - name: Download Publish Artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp-publish
          path: ./publish

      - name: Validate Azure Deployment Credentials
        shell: bash
        run: |
          if [ -z "${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}" ] && [ -z "${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_B31E786770E447D284998F21B6B8E93A }}" ] && [ -z "${{ secrets.AZURE_CREDENTIALS }}" ]; then
            echo "::error::No Azure credentials found. Configure one of: AZURE_WEBAPP_PUBLISH_PROFILE, AZUREAPPSERVICE_PUBLISHPROFILE_B31E786770E447D284998F21B6B8E93A (legacy), or AZURE_CREDENTIALS."
            exit 1
          fi

      - name: Azure Login (Service Principal)
        if: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE == '' && secrets.AZUREAPPSERVICE_PUBLISHPROFILE_B31E786770E447D284998F21B6B8E93A == '' && secrets.AZURE_CREDENTIALS != '' }}
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App (Publish Profile)
        if: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE != '' }}
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: ${{ env.AZURE_WEBAPP_SLOT }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish

      - name: Deploy to Azure Web App (Legacy Publish Profile Secret)
        if: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE == '' && secrets.AZUREAPPSERVICE_PUBLISHPROFILE_B31E786770E447D284998F21B6B8E93A != '' }}
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: ${{ env.AZURE_WEBAPP_SLOT }}
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_B31E786770E447D284998F21B6B8E93A }}
          package: ./publish

      - name: Deploy to Azure Web App (Azure Login Session)
        if: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE == '' && secrets.AZUREAPPSERVICE_PUBLISHPROFILE_B31E786770E447D284998F21B6B8E93A == '' && secrets.AZURE_CREDENTIALS != '' }}
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: ${{ env.AZURE_WEBAPP_SLOT }}
          package: ./publish
