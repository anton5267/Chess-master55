name: Feature request
description: Suggest a product or engineering improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user/developer problem are you solving?
      placeholder: "Current behavior causes ..."
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the desired behavior or API.
      placeholder: "Add/Change ..."
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other options and tradeoffs.
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Conditions that define done.
      placeholder: |
        - [ ] ...
        - [ ] ...
